# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "787d83dca600474d64ea044ad28e4a2d"
name = "containerdoo-calculator"
application_url = "https://containerdoor-nz-freight-calculator.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/update"
  topics = [ "orders/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,read_orders,read_products,read_shipping,write_order_edits,write_orders,write_products,write_shipping"

[auth]
redirect_urls = [
  "https://containerdoor-nz-freight-calculator.vercel.app/api/auth"
]

[app_proxy]
url = "https://containerdoor-nz-freight-calculator.vercel.app/apps/containerdoor"
subpath = "containerdoor"
prefix = "apps"
